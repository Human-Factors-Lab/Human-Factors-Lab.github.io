<meta name="viewport" content="width=device-width, initial-scale=1">
<meta charset="utf-8">
{% assign data = site.data.data %}
<meta name="author" content="{{ data.author }}">
<meta name="description" content="{{ page.excerpt | default: page.header.excerpt | default: data.seo_desc | strip_html | normalize_whitespace }}">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ data.seo_title }}{% endif %}</title>
<!-- Favicon -->
<link rel="icon apple-touch-icon" href="{{ "/assets/img/brand/ou-favicon.png" | relative_url }}" type="image/png">
<!-- Fonts -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700">
<!-- Icons -->
<link rel="stylesheet" href="{{ "/assets/vendor/nucleo/css/nucleo.css" | relative_url }}">
<link rel="stylesheet" href="{{ "/assets/vendor/font-awesome/css/font-awesome.min.css" | relative_url }}">
<!-- Argon CSS -->
<link rel="stylesheet" type="text/css" href="{{ "/assets/css/argon.css?v=1.0.1" | relative_url }}">
<link rel="stylesheet" type="text/css" href="{{ "/assets/css/custom.css" | relative_url }}">
